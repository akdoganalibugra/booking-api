services:
  mysql:
    image: mysql:8.4
    container_name: booking-api-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: booking_api
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    container_name: booking-api-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://root:root@mysql:3306/booking_api
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 1h
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma migrate deploy &&
             node dist/server.js"

  worker:
    build:
      context: .
    container_name: booking-api-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://root:root@mysql:3306/booking_api
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 1h
    command: >
      sh -c "npx prisma migrate deploy &&
             node dist/jobs/expiry-worker.js"

volumes:
  mysql_data:
